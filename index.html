<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copilot Sales AI — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

:root{
  --purple:#73579C;
  --purple-light:#9B7EC8;
  --purple-dark:#4A3870;
  --pink:#E8409A;
  --yellow:#F5C842;
  --bg:#0A0810;
  --surface:rgba(255,255,255,0.05);
  --surface-hover:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.1);
  --border-focus:rgba(115,87,156,0.8);
  --white:#FFFFFF;
  --gray:#9090A8;
  --lgray:#C8C8D8;
}

body{
  background:var(--bg);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

/* ─── ANIMATED BACKGROUND ─── */
.bg-layer{
  position:fixed;
  inset:0;
  z-index:0;
  overflow:hidden;
}

.bg-orb{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.35;
  animation:float 12s ease-in-out infinite;
}

.orb1{
  width:600px;height:600px;
  background:radial-gradient(circle,#73579C,transparent 70%);
  top:-200px;left:-200px;
  animation-delay:0s;
}

.orb2{
  width:400px;height:400px;
  background:radial-gradient(circle,#E8409A,transparent 70%);
  bottom:-100px;right:-100px;
  animation-delay:-4s;
  opacity:0.25;
}

.orb3{
  width:300px;height:300px;
  background:radial-gradient(circle,#F5C842,transparent 70%);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  animation-delay:-8s;
  opacity:0.15;
}

@keyframes float{
  0%,100%{transform:translateY(0) scale(1)}
  33%{transform:translateY(-30px) scale(1.05)}
  66%{transform:translateY(20px) scale(0.97)}
}

/* Grid overlay */
.bg-grid{
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(115,87,156,0.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(115,87,156,0.06) 1px,transparent 1px);
  background-size:60px 60px;
  z-index:0;
}

/* ─── MAIN CONTAINER ─── */
.container{
  position:relative;
  z-index:1;
  width:100%;
  max-width:420px;
  padding:24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
  animation:fadeUp 0.7s ease both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(32px)}
  to{opacity:1;transform:translateY(0)}
}

/* ─── LOGO ─── */
.logo-wrap{
  margin-bottom:28px;
  text-align:center;
  animation:fadeUp 0.7s ease 0.1s both;
}

.logo-img{
  width:160px;
  filter:drop-shadow(0 0 24px rgba(115,87,156,0.5));
  transition:filter 0.3s;
}

.logo-img:hover{
  filter:drop-shadow(0 0 32px rgba(115,87,156,0.8));
}

.product-name{
  font-size:13px;
  font-weight:500;
  color:var(--gray);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-top:10px;
}

.product-name span{
  color:var(--purple-light);
}

/* ─── CARD ─── */
.card{
  width:100%;
  background:rgba(15,10,25,0.7);
  border:1px solid var(--border);
  border-radius:20px;
  padding:32px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:
    0 0 0 1px rgba(115,87,156,0.1),
    0 24px 64px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.05);
  animation:fadeUp 0.7s ease 0.2s both;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.card-header{
  text-align:center;
}

.card-title{
  font-size:20px;
  font-weight:700;
  color:var(--white);
  letter-spacing:-0.3px;
}

.card-sub{
  font-size:13px;
  color:var(--gray);
  margin-top:5px;
  line-height:1.5;
}

/* ─── ALERT ─── */
.alert{
  padding:12px 14px;
  border-radius:10px;
  font-size:13px;
  line-height:1.5;
  display:none;
  animation:fadeUp 0.3s ease;
}

.alert.error{background:rgba(232,64,154,0.12);border:1px solid rgba(232,64,154,0.3);color:#ff99cc;display:block}
.alert.success{background:rgba(46,204,113,0.1);border:1px solid rgba(46,204,113,0.25);color:#80ffb0;display:block}
.alert.info{background:rgba(115,87,156,0.12);border:1px solid rgba(115,87,156,0.3);color:#b899ff;display:block}

/* ─── FIELDS ─── */
.field{
  display:flex;
  flex-direction:column;
  gap:7px;
}

.field label{
  font-size:12px;
  font-weight:600;
  color:var(--lgray);
  letter-spacing:0.5px;
  text-transform:uppercase;
}

.input-wrap{
  position:relative;
}

.input-icon{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  color:var(--gray);
  font-size:16px;
  pointer-events:none;
}

.field input{
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  border-radius:12px;
  padding:13px 14px 13px 44px;
  font-size:14px;
  color:var(--white);
  font-family:'Inter',sans-serif;
  outline:none;
  transition:all 0.2s;
  width:100%;
}

.field input:focus{
  border-color:var(--border-focus);
  background:rgba(115,87,156,0.08);
  box-shadow:0 0 0 3px rgba(115,87,156,0.12);
}

.field input::placeholder{color:#444}

/* ─── PRIMARY BUTTON ─── */
.btn-primary{
  background:linear-gradient(135deg,#73579C 0%,#9B7EC8 50%,#E8409A 100%);
  color:white;
  border:none;
  border-radius:12px;
  padding:14px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  width:100%;
  font-family:'Inter',sans-serif;
  transition:all 0.25s;
  position:relative;
  overflow:hidden;
  letter-spacing:0.3px;
}

.btn-primary::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
  opacity:0;
  transition:opacity 0.2s;
}

.btn-primary:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 30px rgba(115,87,156,0.5);
}

.btn-primary:hover::before{opacity:1}
.btn-primary:active{transform:translateY(0)}

.btn-primary:disabled{
  background:rgba(115,87,156,0.25);
  cursor:not-allowed;
  transform:none;
  box-shadow:none;
}

/* ─── LINK BUTTON ─── */
.link-btn{
  background:none;
  border:none;
  color:var(--purple-light);
  font-size:13px;
  cursor:pointer;
  text-align:center;
  padding:4px;
  font-family:'Inter',sans-serif;
  transition:color 0.2s;
}

.link-btn:hover{color:var(--pink)}

/* ─── SCREENS ─── */
#reset-screen,#newpass-screen{display:none}

/* ─── FOOTER ─── */
.footer{
  margin-top:20px;
  text-align:center;
  font-size:12px;
  color:#444;
  line-height:1.7;
  animation:fadeUp 0.7s ease 0.4s both;
}

.footer .powered{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  color:#555;
}

.footer .powered span{
  color:var(--purple-light);
  font-weight:600;
}

/* ─── SPINNER ─── */
.spinner{
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,0.25);
  border-top-color:white;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  display:inline-block;
}

@keyframes spin{to{transform:rotate(360deg)}}

.btn-inner{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

/* ─── SCREEN TRANSITIONS ─── */
.screen{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:0;
}

.screen.hidden{display:none}

.screen-enter{
  animation:screenIn 0.35s ease both;
}

@keyframes screenIn{
  from{opacity:0;transform:translateX(20px)}
  to{opacity:1;transform:translateX(0)}
}

/* Divider */
.or-divider{
  display:flex;
  align-items:center;
  gap:12px;
  color:#444;
  font-size:11px;
}

.or-divider::before,.or-divider::after{
  content:'';flex:1;
  height:1px;background:var(--border);
}
</style>
</head>

<script>
const SUPABASE_URL = 'https://koaesjjxmibetscjwfrn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_PvDRevOVtSyUgVQnaOAkyw_eLFeXMCQ';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

window.addEventListener('load', async () => {
  const hash = window.location.hash;
  if (hash.includes('type=recovery')) { showNewPass(); return; }
  const { data:{ session } } = await sb.auth.getSession();
  if (session) await redirectByRole(session.user.id);
});

async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showAlert('alert-box','error','Preencha o e-mail e a senha.'); return; }
  setLoading('btn-login', true, 'Entrando...');
  clearAlert('alert-box');
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    setLoading('btn-login', false, 'Entrar');
    if (error.message.includes('Invalid login')) showAlert('alert-box','error','E-mail ou senha incorretos.');
    else if (error.message.includes('Email not confirmed')) showAlert('alert-box','info','Confirme seu e-mail antes de entrar.');
    else showAlert('alert-box','error','Erro: ' + error.message);
    return;
  }
  await redirectByRole(data.user.id);
}

async function redirectByRole(userId) {
  try {
    const { data: profile, error } = await sb
      .from('profiles')
      .select('role')
      .eq('id', userId)
      .single();
    
    console.log('Profile:', profile, 'Error:', error);
    
    if (error || !profile) {
      window.location.href = 'vendedor.html';
      return;
    }

    if (profile.role === 'admin') window.location.href = 'admin.html';
    else if (profile.role === 'gestor') window.location.href = 'gestor.html';
    else window.location.href = 'vendedor.html';
  } catch(e) { 
    console.error('Redirect error:', e);
    window.location.href = 'vendedor.html'; 
  }
}

async function sendReset() {
  const email = document.getElementById('reset-email').value.trim();
  if (!email) { showAlert('reset-alert','error','Digite seu e-mail.'); return; }
  setLoading('btn-reset', true, 'Enviando...');
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/index.html' });
  setLoading('btn-reset', false, 'Enviar link de recuperação');
  if (error) showAlert('reset-alert','error','Erro: ' + error.message);
  else showAlert('reset-alert','success','Link enviado! Verifique sua caixa de entrada.');
}

async function setNewPassword() {
  const np = document.getElementById('new-password').value;
  const cp = document.getElementById('confirm-password').value;
  if (!np || np.length < 8) { showAlert('newpass-alert','error','Mínimo 8 caracteres.'); return; }
  if (np !== cp) { showAlert('newpass-alert','error','As senhas não coincidem.'); return; }
  setLoading('btn-newpass', true, 'Salvando...');
  const { error } = await sb.auth.updateUser({ password: np });
  setLoading('btn-newpass', false, 'Salvar nova senha');
  if (error) showAlert('newpass-alert','error','Erro: ' + error.message);
  else {
    showAlert('newpass-alert','success','Senha salva! Redirecionando...');
    setTimeout(async () => {
      const { data:{ user } } = await sb.auth.getUser();
      if (user) await redirectByRole(user.id);
      else showLogin();
    }, 1500);
  }
}

function showLogin() {
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('reset-screen').classList.add('hidden');
  document.getElementById('newpass-screen').classList.add('hidden');
}

function showReset() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('reset-screen').classList.remove('hidden');
  document.getElementById('newpass-screen').classList.add('hidden');
}

function showNewPass() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('reset-screen').classList.add('hidden');
  document.getElementById('newpass-screen').classList.remove('hidden');
}

function showAlert(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'alert ' + type;
  el.textContent = msg;
}

function clearAlert(id) {
  const el = document.getElementById(id);
  el.className = 'alert';
  el.textContent = '';
}

function setLoading(btnId, loading, text) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.querySelector('.btn-inner').innerHTML = loading
    ? '<div class="spinner"></div>' + text
    : text;
}
</script>
</body>
</html>
